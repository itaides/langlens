name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      - name: Verify CLI runs
        run: node dist/cli.js --version

      - name: Verify extension JS syntax
        run: node -c extension/content.js && node -c extension/popup.js && node -c extension/defaults.js
